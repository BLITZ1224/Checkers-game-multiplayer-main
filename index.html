<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Checkers - BLITZ</title>
    
    <script src="libs/p5.min.js"></script>
    <script src="libs/p5.dom.min.js"></script>
    <script src="libs/p5.sound.min.js"></script>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script src="cell.js"></script>
    <script src="sketch.js"></script>
    
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e; /* ပိုရင့်တဲ့အရောင် ပြောင်းထားပါတယ် */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #multiplayer-controls {
            background: #16213e;
            padding: 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 2px solid #0f3460;
        }
        .id-section {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        #my-id {
            background: #0f3460;
            padding: 4px 10px;
            border-radius: 4px;
            color: #e94560;
            cursor: pointer;
            border: 1px dashed #e94560;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #0f3460;
            margin: 5px;
            width: 250px;
            background: #1a1a2e;
            color: white;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            background: #ff2e63;
            transform: scale(1.05);
        }
        #status { 
            font-weight: bold; 
            color: #4ecca3; 
            margin-top: 10px;
            font-size: 0.9rem;
        }
        canvas { 
            border: 8px solid #16213e; 
            margin-top: 30px; 
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="multiplayer-controls">
        <div class="id-section">
            <span>သင်၏ ID: </span><b id="my-id" title="Copy ID">ထုတ်ပေးနေသည်...</b>
        </div>
        <div>
            <input type="text" id="peer-id-input" placeholder="တစ်ဖက်လူ၏ ID ကို ဤနေရာမှာ ထည့်ပါ">
            <button id="connect-btn">ချိတ်ဆက်မည်</button>
        </div>
        <div id="status">အခြေအနေ: ချိတ်ဆက်မှု စောင့်ဆိုင်းနေပါသည်...</div>
    </div>

    </body>
</html>
