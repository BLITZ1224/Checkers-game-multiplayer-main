<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Checkers - BLITZ Neon</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div id="canvas-holder"></div>

        <aside class="sidebar">
            <div class="glass-panel">
                <h2 class="neon-text">BLITZ CHECKERS</h2>
                <div class="timer-wrapper">
                    <div id="timer-bar"></div>
                    <span id="timer-label">30s</span>
                </div>
                <div class="game-stats">
                    <p>အဖြူ: <span id="white-count">10</span> | အမည်း: <span id="black-count">10</span></p>
                    <p id="turn-display">အလှည့် စောင့်ဆိုင်းနေသည်...</p>
                </div>
            </div>

            <div class="glass-panel chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="စာရိုက်ပါ...">
                    <button id="send-msg-btn">Send</button>
                </div>
            </div>

            <div class="glass-panel connection-panel">
                <div class="id-display">
                    ID: <b id="my-id">ထုတ်ပေးနေသည်...</b>
                </div>
                <input type="text" id="peer-id-input" placeholder="တစ်ဖက်လူ ID ထည့်ရန်">
                <button id="connect-btn">Connect Player</button>
                <div id="status">အခြေအနေ: စောင့်ဆိုင်းနေသည်...</div>
            </div>
        </aside>
    </div>

    <script src="cell.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
